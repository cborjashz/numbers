<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Lotería - PDV</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e2e; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #2d2d44; padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { text-align: center; margin-bottom: 20px; }
        .login-box, .game-box { display: none; }
        .login-box.active, .game-box.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: #3b3b5c; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; background: #00a86b; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:hover { background: #008f5a; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin: 20px 0; }
        .num-btn { padding: 10px 0; background: #3b3b5c; border: none; border-radius: 5px; color: white; font-size: 14px; cursor: pointer; }
        .num-btn.selected { background: #00a86b; color: black; font-weight: bold; }
        .num-btn:hover { background: #4a4a6e; }
        .opciones-rapidas { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .opcion-btn { flex: 1; min-width: 60px; padding: 10px; background: #ffaa00; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .opcion-btn:hover { background: #e69900; }
        .form-row { display: flex; gap: 10px; }
        .form-row input { flex: 1; }
        .message { margin-top: 15px; text-align: center; font-weight: bold; }
        .success { color: #00a86b; }
        .error { color: #ff5555; }
        .logout { background: #555; margin-top: 10px; }
        .logout:hover { background: #777; }
        #opcionesContainer {
            min-height: 40px;
            border: 1px dashed #ffaa00;
            padding: 5px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎱 LOTERÍA</h1>

        <!-- LOGIN -->
        <div id="loginBox" class="login-box active">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="loginUser" placeholder="Usuario">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button onclick="login()">Acceder</button>
            <div id="loginMsg" class="message error"></div>
        </div>

        <!-- JUEGO -->
        <div id="gameBox" class="game-box">
            <div style="display:flex; justify-content:space-between;">
                <span id="userDisplay" style="font-weight:bold;"></span>
                <button class="logout" onclick="logout()" style="width:auto; padding:5px 15px;">Salir</button>
            </div>

            <!-- Cargar recibo de referencia -->
            <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
                <input type="number" id="reciboReferencia" placeholder="Recibo de referencia" style="flex: 1;">
                <button onclick="cargarRecibo()" style="width: auto; padding: 10px 20px; background: #ffaa00; color: black;">📂 Cargar Recibo</button>
                <button onclick="reimprimirRecibo()" style="width: auto; padding: 10px 15px; background: #2196f3; color: white;" title="Reimprimir recibo">🖨️</button>
            </div>

            <!-- Opciones rápidas (cargadas desde la BD) -->
            <div class="opciones-rapidas" id="opcionesContainer"></div>

            <!-- Botón para limpiar selección -->
            <div style="display: flex; justify-content: center; margin: 5px 0 15px 0;">
                <button onclick="limpiarSeleccion()" style="width: auto; padding: 8px 25px; background: #d32f2f; color: white; font-size: 14px; border-radius: 8px;">🗑️ Limpiar Selección</button>
            </div>

            <!-- Tablero de números -->
            <div class="grid" id="numberGrid"></div>

            <!-- Formulario de venta -->
            <div class="form-row">
                <input type="text" id="clienteInput" placeholder="Cliente">
                <input type="number" id="precioInput" placeholder="Precio L." step="0.01">
            </div>
            <button onclick="vender()">🟢 VENDER</button>
            <div id="resultMsg" class="message"></div>
        </div>
    </div>

    <script>
        // Variables de estado
        let currentUser = null;
        let currentToken = null;
        let selectedNumbers = [];

        // URL de la API
        const API = '/api';

        // Login
        async function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const res = await fetch(API + '/login', {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({usuario: user, password: pass})
            });
            const data = await res.json();
            if (res.ok) {
                // Guardar datos en el navegador
                currentUser = data.usuario;
                currentToken = data.token;
                localStorage.setItem('loteria_token', data.token);
                localStorage.setItem('loteria_usuario', data.usuario);

                document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
                document.getElementById('loginBox').classList.remove('active');
                document.getElementById('gameBox').classList.add('active');
                cargarOpciones();
                generarTablero();
            } else {
                document.getElementById('loginMsg').innerText = '❌ ' + data.detail;
            }
        }

        async function logout() {
            const token = localStorage.getItem('loteria_token');
            if (token) {
                try {
                    // Enviar petición al backend para cerrar la sesión
                    await fetch(API + '/logout', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token,
                            'Content-Type': 'application/json'
                        }
                    });
                } catch (error) {
                    // Si falla la red, igual limpiamos localmente
                    console.error('Error al cerrar sesión en el servidor:', error);
                }
            }

            // Limpiar localStorage y variables
            localStorage.removeItem('loteria_token');
            localStorage.removeItem('loteria_usuario');
            currentUser = null;
            currentToken = null;
            selectedNumbers = [];
            
            document.getElementById('gameBox').classList.remove('active');
            document.getElementById('loginBox').classList.add('active');
            document.getElementById('loginMsg').innerText = '';
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

        // Generar los 100 botones (00 al 99)
        function generarTablero() {
            const grid = document.getElementById('numberGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const num = i.toString().padStart(2, '0');
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = num;
                btn.dataset.num = num;
                btn.onclick = () => toggleNumber(num, btn);
                grid.appendChild(btn);
            }
        }

        async function cargarRecibo() {
            const numRecibo = document.getElementById('reciboReferencia').value;
            if (!numRecibo) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Ingrese un número de recibo</span>';
                return;
            }
    
            const token = localStorage.getItem('loteria_token');
            if (!token) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                logout();
                return;
            }

            try {
                const res = await fetch(API + '/recibo/' + numRecibo, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                if (!res.ok) {
                    if (res.status === 401) {
                        document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                        logout();
                        return;
                    }
                    const data = await res.json();
                    document.getElementById('resultMsg').innerHTML = `<span class="error">❌ ${data.detail}</span>`;
                    return;
                }
        
                const data = await res.json();
        
                document.getElementById('clienteInput').value = data.cliente;
                document.getElementById('precioInput').value = data.precio_unitario;
        
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                selectedNumbers = [];
        
                data.numeros.forEach(num => {
                    const btn = document.querySelector(`.num-btn[data-num="${num}"]`);
                    if (btn) {
                        btn.classList.add('selected');
                        selectedNumbers.push(num);
                    }
                });
        
                document.getElementById('resultMsg').innerHTML = `<span class="success">✅ Recibo ${numRecibo} cargado! ${data.numeros.length} números seleccionados.</span>`;
        
            } catch (error) {
                document.getElementById('resultMsg').innerHTML = `<span class="error">❌ Error de conexión</span>`;
            }
        }

        async function reimprimirRecibo() {
            const numRecibo = document.getElementById('reciboReferencia').value;
            if (!numRecibo) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Ingrese un número de recibo para reimprimir</span>';
                return;
            }

            const token = localStorage.getItem('loteria_token');
            if (!token) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                logout();
                return;
            }

            try {
                const res = await fetch(API + '/reimprimir/' + numRecibo, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                if (!res.ok) {
                    if (res.status === 401) {
                        document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                        logout();
                        return;
                    }
                    const data = await res.json();
                    document.getElementById('resultMsg').innerHTML = `<span class="error">❌ ${data.detail}</span>`;
                    return;
                }

                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `recibo_${numRecibo}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

                document.getElementById('resultMsg').innerHTML = `<span class="success">✅ Recibo ${numRecibo} reimpreso exitosamente!</span>`;

            } catch (error) {
                document.getElementById('resultMsg').innerHTML = `<span class="error">❌ Error de conexión al reimprimir</span>`;
            }
        }        

        function toggleNumber(num, btn) {
            const idx = selectedNumbers.indexOf(num);
            if (idx > -1) {
                selectedNumbers.splice(idx, 1);
                btn.classList.remove('selected');
            } else {
                selectedNumbers.push(num);
                btn.classList.add('selected');
            }
        }

        async function cargarOpciones() {
            const container = document.getElementById('opcionesContainer');
            container.innerHTML = '';

            const token = localStorage.getItem('loteria_token');
            if (!token) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                logout();
                return;
            }

            const res = await fetch(API + '/opciones', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            
            if (!res.ok) {
                if (res.status === 401) {
                    document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                    logout();
                    return;
                }
                return;
            }

            const opciones = await res.json();
            
            if (opciones.length === 0) {
                container.innerHTML = '<div style="color:#aaa; font-size:14px; text-align:center; width:100%;">No hay opciones rápidas configuradas</div>';
                return;
            }
            
            opciones.forEach(op => {
                const btn = document.createElement('button');
                btn.className = 'opcion-btn';
                btn.innerText = op.nombre_opcion;
                btn.onclick = () => seleccionarOpcion(op.numeros_incluidos);
                container.appendChild(btn);
            });
        }

        function limpiarSeleccion() {
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            selectedNumbers = [];
            document.getElementById('resultMsg').innerHTML = '';
        }

        function seleccionarOpcion(numerosStr) {
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            selectedNumbers = [];
            const nums = numerosStr.split(',');
            nums.forEach(n => {
                const btn = document.querySelector(`.num-btn[data-num="${n}"]`);
                if (btn) { btn.classList.add('selected'); selectedNumbers.push(n); }
            });
        }

        async function vender() {
            const cliente = document.getElementById('clienteInput').value;
            const precio = document.getElementById('precioInput').value;

            if (parseFloat(precio) <= 0) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ El precio debe ser mayor a 0</span>';
                return;
            }
            if (!cliente || !precio) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Complete Cliente y Precio</span>';
                return;
            }
            if (selectedNumbers.length === 0) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Seleccione al menos un número</span>';
                return;
            }

            const token = localStorage.getItem('loteria_token');
            if (!token) {
                document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                logout();
                return;
            }
            
            const res = await fetch(API + '/vender', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    nombre_vendedor: currentUser,
                    cliente: cliente,
                    numeros: selectedNumbers,
                    precio_unitario: parseFloat(precio)
                })
            });
            
            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `recibo_${Date.now()}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                document.getElementById('resultMsg').innerHTML = '<span class="success">✅ Venta exitosa! El recibo se ha descargado.</span>';
                
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                selectedNumbers = [];
                document.getElementById('clienteInput').value = '';
                document.getElementById('precioInput').value = '';
            } else {
                if (res.status === 401) {
                    document.getElementById('resultMsg').innerHTML = '<span class="error">❌ Sesión expirada. Por favor, vuelva a iniciar sesión.</span>';
                    logout();
                    return;
                }
                const data = await res.json();
                document.getElementById('resultMsg').innerHTML = `<span class="error">❌ ${data.detail}</span>`;
            }
        }

        // Verificar si ya hay una sesión guardada al cargar la página
        window.onload = function() {
            const savedToken = localStorage.getItem('loteria_token');
            const savedUser = localStorage.getItem('loteria_usuario');
            if (savedToken && savedUser) {
                currentToken = savedToken;
                currentUser = savedUser;
                document.getElementById('userDisplay').innerText = '👤 ' + currentUser;
                document.getElementById('loginBox').classList.remove('active');
                document.getElementById('gameBox').classList.add('active');
                cargarOpciones();
                generarTablero();
            }
        };
    </script>
</body>
</html>
